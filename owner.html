<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дашборд — CallCRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, collectionGroup, onSnapshot }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyD2ssxYMzVt2IUQ2ujRg_7hu2EO3XwtwNg",
      authDomain:        "ds-group-c8bb2.firebaseapp.com",
      projectId:         "ds-group-c8bb2",
      storageBucket:     "ds-group-c8bb2.firebasestorage.app",
      messagingSenderId: "238132930383",
      appId:             "1:238132930383:web:ba08ba7e5f3b38a98c073a",
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const BASE = 'https://ggklayd.github.io/callcrm';

    let allProjects = {};
    let allClients  = [];

    onSnapshot(collection(db,'admin_projects'), snap => {
      allProjects = {};
      snap.docs.forEach(d => { allProjects[d.id] = {id:d.id,...d.data()}; });
      renderAll();
    });

    onSnapshot(collectionGroup(db,'clients'), snap => {
      allClients = snap.docs.map(d => ({id:d.id,...d.data()}));
      renderAll();
    });

    function renderAll() {
      renderStats();
      renderProjects();
      renderManagers();
      renderFeed();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('main').style.display    = 'block';
    }

    function renderStats() {
      const cl    = allClients;
      const total = cl.length;
      const lid   = cl.filter(c=>c.result==='Лид').length;
      const perz  = cl.filter(c=>c.result==='Перезвонить').length;
      const otkaz = cl.filter(c=>c.result==='Отказ').length;
      const conv  = total ? Math.round(lid/total*100) : 0;
      const today = new Date(); today.setHours(0,0,0,0);
      const todayCnt = cl.filter(c=>{ try{ const d=c.createdAt?.toDate?c.createdAt.toDate():new Date(c.createdAt); return d>=today; }catch{return false;} }).length;
      const mgrs  = new Set(cl.map(c=>c.manager).filter(Boolean)).size;

      set('s-total', total); set('s-lid', lid); set('s-conv', conv+'%');
      set('s-today', todayCnt); set('s-perz', perz); set('s-otkaz', otkaz);
      set('s-proj', Object.keys(allProjects).length); set('s-mgr', mgrs);
    }

    function renderProjects() {
      const wrap  = document.getElementById('proj-wrap');
      const items = Object.values(allProjects);
      if (!items.length) { wrap.innerHTML='<div class="empty-note">Нет проектов</div>'; return; }

      wrap.innerHTML = items.map(p => {
        const cl   = allClients.filter(c=>c.project===p.id);
        const lid  = cl.filter(c=>c.result==='Лид').length;
        const total= cl.length;
        const conv = total ? Math.round(lid/total*100) : 0;
        const pct  = total ? Math.min(100,Math.round(lid/total*100)) : 0;
        const col  = strColor(p.name);

        return '<div class="proj-card">'
          + '<div class="proj-top">'
          +   '<div class="proj-av" style="background:'+col+'">'+(p.name||'?')[0].toUpperCase()+'</div>'
          +   '<div class="proj-info"><div class="proj-name">'+esc(p.name)+'</div>'
          +   '<div class="proj-meta">'+((p.managers||[]).length)+' менеджеров · '+total+' контактов</div></div>'
          +   '<span class="badge '+(p.active?'b-green':'b-yellow')+'">'+(p.active?'Активен':'Пауза')+'</span>'
          + '</div>'
          + '<div class="proj-nums">'
          +   '<div class="pn"><div class="pn-v green">'+lid+'</div><div class="pn-l">Лидов</div></div>'
          +   '<div class="pn"><div class="pn-v blue">'+conv+'%</div><div class="pn-l">Конверсия</div></div>'
          +   '<div class="pn"><div class="pn-v">'+total+'</div><div class="pn-l">Всего</div></div>'
          + '</div>'
          + '<div class="bar-wrap"><div class="bar" style="width:'+pct+'%"></div></div>'
          + '<div class="proj-links">'
          +   '<a class="plink" href="'+BASE+'/admin.html" target="_blank">Управление</a>'
          +   '<a class="plink" href="'+BASE+'/report.html?project='+p.id+'" target="_blank">Отчёт</a>'
          + '</div></div>';
      }).join('');
    }

    function renderManagers() {
      const wrap = document.getElementById('mgr-wrap');
      const map  = {};
      allClients.forEach(c => {
        const m = c.manager||'—';
        if (!map[m]) map[m]={total:0,lid:0,perz:0,otkaz:0};
        map[m].total++;
        if (c.result==='Лид') map[m].lid++;
        if (c.result==='Перезвонить') map[m].perz++;
        if (c.result==='Отказ') map[m].otkaz++;
      });
      const sorted = Object.entries(map).sort((a,b)=>b[1].lid-a[1].lid);
      if (!sorted.length) { wrap.innerHTML='<div class="empty-note">Нет данных</div>'; return; }

      wrap.innerHTML = '<table class="tbl"><thead><tr>'
        + '<th>Менеджер</th><th class="num">Всего</th><th class="num">Лидов</th><th class="num">Конверсия</th><th class="num">Отказ</th>'
        + '</tr></thead><tbody>'
        + sorted.map(([name,s]) => {
            const conv = s.total ? Math.round(s.lid/s.total*100) : 0;
            return '<tr><td class="mgr-cell"><div class="mgr-av" style="background:'+strColor(name)+'">'+name[0].toUpperCase()+'</div>'+esc(name)+'</td>'
              + '<td class="num">'+s.total+'</td><td class="num green">'+s.lid+'</td>'
              + '<td class="num blue">'+conv+'%</td><td class="num red">'+s.otkaz+'</td></tr>';
          }).join('')
        + '</tbody></table>';
    }

    function renderFeed() {
      const wrap   = document.getElementById('feed-wrap');
      const sorted = [...allClients].filter(c=>c.createdAt).sort((a,b)=>{
        try { const da=a.createdAt?.toDate?a.createdAt.toDate():new Date(a.createdAt); const db2=b.createdAt?.toDate?b.createdAt.toDate():new Date(b.createdAt); return db2-da; } catch{return 0;}
      }).slice(0,15);

      if (!sorted.length) { wrap.innerHTML='<div class="empty-note">Нет активности</div>'; return; }

      const COLS = {'Лид':'#16a34a','Перезвонить':'#ca8a04','В работе':'#1d4ed8','Не дозвонился':'#c2410c','Отказ':'#dc2626'};
      const BGS  = {'Лид':'#dcfce7','Перезвонить':'#fef9c3','В работе':'#dbeafe','Не дозвонился':'#ffedd5','Отказ':'#fee2e2'};

      wrap.innerHTML = sorted.map(c => {
        const col = COLS[c.result]||'#6b7280';
        const bg  = BGS[c.result]||'#f3f4f6';
        let t='—'; try{ const d=c.createdAt?.toDate?c.createdAt.toDate():new Date(c.createdAt); t=d.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }catch{}
        return '<div class="fi"><div class="fi-dot" style="background:'+col+'"></div>'
          + '<div class="fi-body"><span class="fi-org">'+esc(c.org_name||'—')+'</span>'
          + '<span class="fi-mgr"> · '+esc(c.manager||'—')+'</span></div>'
          + '<span class="fi-badge" style="background:'+bg+';color:'+col+'">'+esc(c.result||'—')+'</span>'
          + '<span class="fi-time">'+t+'</span></div>';
      }).join('');
    }

    function set(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}
    function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function strColor(s){const p=['#2563eb','#16a34a','#ca8a04','#dc2626','#7c3aed','#0891b2'];let h=0;for(let i=0;i<(s||'').length;i++)h=s.charCodeAt(i)+((h<<5)-h);return p[Math.abs(h)%p.length];}
  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f5f6f8;--white:#fff;--border:#e5e7eb;--border2:#d1d5db;--text:#111827;--sec:#6b7280;--muted:#9ca3af;--accent:#2563eb;--rad:10px;--shadow:0 1px 3px rgba(0,0,0,.08)}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

    .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;box-shadow:var(--shadow)}
    .t-logo{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
    .t-title{font-size:15px;font-weight:600}
    .t-sub{font-size:12px;color:var(--muted);margin-top:1px}
    .t-links{margin-left:auto;display:flex;gap:8px}
    .t-link{padding:6px 12px;border-radius:7px;border:1px solid var(--border2);color:var(--sec);font-size:12px;text-decoration:none;transition:all .12s}
    .t-link:hover{border-color:var(--accent);color:var(--accent)}

    .page{max-width:1060px;margin:0 auto;padding:20px 20px 60px;display:flex;flex-direction:column;gap:20px}

    .sec{display:flex;flex-direction:column;gap:10px}
    .sec-title{font-size:15px;font-weight:600}

    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .stat{background:var(--white);border:1px solid var(--border);border-radius:var(--rad);padding:14px 16px;box-shadow:var(--shadow)}
    .stat-n{font-size:26px;font-weight:600;line-height:1}
    .stat-n.green{color:#16a34a} .stat-n.blue{color:var(--accent)} .stat-n.yellow{color:#ca8a04} .stat-n.red{color:#dc2626}
    .stat-l{font-size:12px;color:var(--muted);margin-top:4px}

    .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
    .proj-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rad);padding:16px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow)}
    .proj-top{display:flex;align-items:center;gap:10px}
    .proj-av{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#fff;flex-shrink:0}
    .proj-info{flex:1;min-width:0}
    .proj-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .proj-meta{font-size:12px;color:var(--muted);margin-top:1px}
    .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
    .b-green{background:#dcfce7;color:#16a34a} .b-yellow{background:#fef9c3;color:#ca8a04}
    .proj-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .pn{text-align:center}
    .pn-v{font-size:20px;font-weight:600} .pn-v.green{color:#16a34a} .pn-v.blue{color:var(--accent)}
    .pn-l{font-size:11px;color:var(--muted);margin-top:1px}
    .bar-wrap{height:4px;background:#f3f4f6;border-radius:2px;overflow:hidden}
    .bar{height:100%;background:#16a34a;border-radius:2px;transition:width .4s}
    .proj-links{display:flex;gap:8px}
    .plink{flex:1;text-align:center;padding:6px;border-radius:7px;border:1px solid var(--border2);color:var(--sec);font-size:12px;text-decoration:none;transition:all .12s}
    .plink:hover{border-color:var(--accent);color:var(--accent)}

    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--white);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;box-shadow:var(--shadow)}

    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl thead tr{border-bottom:1px solid var(--border)}
    .tbl th{padding:9px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;background:#fafafa}
    .tbl td{padding:10px 14px;border-bottom:1px solid var(--border)}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:#fafafa}
    .mgr-cell{display:flex;align-items:center;gap:9px}
    .mgr-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
    .num{text-align:right;font-weight:500}
    .num.green{color:#16a34a} .num.blue{color:var(--accent)} .num.red{color:#dc2626}

    .fi{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
    .fi:last-child{border-bottom:none}
    .fi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .fi-body{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .fi-org{font-weight:500}
    .fi-mgr{color:var(--muted);font-size:12px}
    .fi-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
    .fi-time{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}

    .empty-note{padding:30px;text-align:center;color:var(--muted);font-size:13px}
    #loading{display:flex;align-items:center;justify-content:center;min-height:300px;font-size:14px;color:var(--muted)}
    #main{display:none}
    @media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="topbar">
  <div class="t-logo">&#128081;</div>
  <div><div class="t-title">Дашборд владельца</div><div class="t-sub">CallCRM — все проекты</div></div>
  <div class="t-links">
    <a class="t-link" href="https://ggklayd.github.io/callcrm/admin.html" target="_blank">&#9881; Администратор</a>
  </div>
</div>

<div class="page">
  <div id="loading">Загружаю данные...</div>
  <div id="main">

    <div class="sec">
      <div class="sec-title">Общая статистика</div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Всего контактов</div></div>
        <div class="stat"><div class="stat-n green" id="s-lid">0</div><div class="stat-l">Лидов</div></div>
        <div class="stat"><div class="stat-n blue" id="s-conv">0%</div><div class="stat-l">Конверсия</div></div>
        <div class="stat"><div class="stat-n" id="s-today">0</div><div class="stat-l">Добавлено сегодня</div></div>
      </div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-n yellow" id="s-perz">0</div><div class="stat-l">Перезвонить</div></div>
        <div class="stat"><div class="stat-n red" id="s-otkaz">0</div><div class="stat-l">Отказов</div></div>
        <div class="stat"><div class="stat-n" id="s-proj">0</div><div class="stat-l">Проектов</div></div>
        <div class="stat"><div class="stat-n" id="s-mgr">0</div><div class="stat-l">Менеджеров</div></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-title">Проекты</div>
      <div class="proj-grid" id="proj-wrap"></div>
    </div>

    <div class="two-col">
      <div class="sec">
        <div class="sec-title">Менеджеры</div>
        <div class="card" id="mgr-wrap"></div>
      </div>
      <div class="sec">
        <div class="sec-title">Последние записи</div>
        <div class="card" id="feed-wrap"></div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
