<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кабинет администратора — CallCRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, doc, setDoc, onSnapshot, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyD2ssxYMzVt2IUQ2ujRg_7hu2EO3XwtwNg",
      authDomain:        "ds-group-c8bb2.firebaseapp.com",
      projectId:         "ds-group-c8bb2",
      storageBucket:     "ds-group-c8bb2.firebasestorage.app",
      messagingSenderId: "238132930383",
      appId:             "1:238132930383:web:ba08ba7e5f3b38a98c073a",
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const BASE = 'https://ggklayd.github.io/callcrm';

    window.projects = {};
    onSnapshot(collection(db,'admin_projects'), snap => {
      window.projects = {};
      snap.docs.forEach(d => { window.projects[d.id] = {id:d.id,...d.data()}; });
      renderProjects();
    });

    function renderProjects() {
      const list  = document.getElementById('proj-list');
      const items = Object.values(window.projects);
      if (!items.length) {
        list.innerHTML = '<div class="empty"><div class="empty-icon">&#128193;</div><div class="empty-title">Нет проектов</div><div class="empty-sub">Нажмите «Создать проект» чтобы начать</div></div>';
        return;
      }
      list.innerHTML = items.map(p => {
        const col = strColor(p.name);
        return '<div class="proj-row" onclick="openProject(\'' + p.id + '\')">'
          + '<div class="proj-av" style="background:' + col + '">' + (p.name||'?')[0].toUpperCase() + '</div>'
          + '<div class="proj-info"><div class="proj-name">' + esc(p.name) + '</div>'
          + '<div class="proj-meta">' + ((p.managers||[]).length) + ' менеджеров · создан ' + fmtDate(p.createdAt) + '</div></div>'
          + '<span class="badge ' + (p.active?'b-green':'b-yellow') + '">' + (p.active?'Активен':'Пауза') + '</span>'
          + '<div class="proj-btns" onclick="event.stopPropagation()">'
          + '<button class="pb pb-mgr" onclick="copyMgrLink(\'' + p.id + '\')">&#128100; Менеджер</button>'
          + '<button class="pb pb-rep" onclick="openLink(\'' + BASE + '/report.html?project=' + p.id + '\')">&#128065; Отчёт</button>'
          + (p.sheets_url?'<button class="pb pb-sh" onclick="openLink(\'' + p.sheets_url + '\')">&#128202; Таблица</button>':'')
          + '</div></div>';
      }).join('');
    }

    window.createProject = async function() {
      const name   = document.getElementById('np-name').value.trim();
      const sheets = document.getElementById('np-sheets').value.trim();
      if (!name) { showErr('Укажите название'); return; }
      const id = name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-zа-я0-9-]/g,'').slice(0,25) + '-' + Date.now().toString(36);
      setBtnLoad('btn-create', true, 'Создаём...');
      try {
        await setDoc(doc(db,'admin_projects',id), {name, sheets_url:sheets||'', active:true, managers:[], createdAt:serverTimestamp()});
        closeModal('m-create');
        document.getElementById('np-name').value = '';
        document.getElementById('np-sheets').value = '';
        toast('Проект создан!');
      } catch(e) { showErr('Ошибка: '+e.message); }
      finally { setBtnLoad('btn-create', false, 'Создать проект'); }
    };

    window.openProject = function(id) {
      const p = window.projects[id];
      if (!p) return;
      window._dpId = id;
      document.getElementById('dp-name').textContent   = p.name;
      document.getElementById('dp-status').textContent = p.active ? 'Активен' : 'Пауза';
      document.getElementById('dp-status').className   = 'badge ' + (p.active ? 'b-green' : 'b-yellow');
      document.getElementById('dp-id').textContent     = id;
      document.getElementById('dp-lm').textContent     = BASE + '/manager.html?project=' + id + '&manager=ИМЯ';
      document.getElementById('dp-lr').textContent     = BASE + '/report.html?project=' + id;
      document.getElementById('dp-ls').textContent     = p.sheets_url || '—';

      const mgrs = p.managers || [];
      const ml   = document.getElementById('dp-mgrs');
      ml.innerHTML = !mgrs.length ? '<div class="no-mgr">Нет менеджеров. Добавьте ниже.</div>'
        : mgrs.map(m => '<div class="mgr-row"><div class="mgr-av" style="background:'+strColor(m)+'">'+m[0].toUpperCase()+'</div>'
          + '<span class="mgr-name">'+esc(m)+'</span>'
          + '<button class="mgr-link" onclick="copyText(\''+BASE+'/manager.html?project='+id+'&manager='+encodeURIComponent(m)+'\')">Копировать ссылку</button>'
          + '<button class="mgr-del" onclick="removeManager(\''+id+'\',\''+esc(m)+'\')">&#10005;</button></div>').join('');
      openModal('m-detail');
    };

    window.addManager = async function() {
      const id   = window._dpId;
      const name = document.getElementById('new-mgr').value.trim();
      if (!name || !id) return;
      const p = window.projects[id];
      const managers = [...(p.managers||[])];
      if (managers.includes(name)) { toast('Уже добавлен'); return; }
      managers.push(name);
      await setDoc(doc(db,'admin_projects',id),{managers},{merge:true});
      document.getElementById('new-mgr').value = '';
      toast('Менеджер добавлен');
    };

    window.removeManager = async function(pid, name) {
      const p = window.projects[pid];
      const managers = (p.managers||[]).filter(m => m !== name);
      await setDoc(doc(db,'admin_projects',pid),{managers},{merge:true});
    };

    window.copyMgrLink = function(id) {
      const name = prompt('Имя менеджера:');
      if (!name) return;
      copyText(BASE + '/manager.html?project=' + id + '&manager=' + encodeURIComponent(name));
    };
    window.openLink = url => window.open(url,'_blank');
    window.copyText = function(text) {
      if (!text || text === '—') return;
      navigator.clipboard.writeText(text).then(() => toast('Скопировано!')).catch(()=>{});
    };

    function fmtDate(ts) {
      if (!ts) return '—';
      try { const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'2-digit'}); } catch { return '—'; }
    }
    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function strColor(s) {
      const p=['#2563eb','#16a34a','#ca8a04','#dc2626','#7c3aed','#0891b2'];
      let h=0; for(let i=0;i<(s||'').length;i++) h=s.charCodeAt(i)+((h<<5)-h);
      return p[Math.abs(h)%p.length];
    }
    function toast(msg) {
      const t=document.getElementById('toast');
      t.textContent=msg; t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2800);
    }
    function showErr(msg) {
      const e=document.getElementById('form-err');
      e.textContent=msg; e.style.display='block';
      setTimeout(()=>e.style.display='none',4000);
    }
    function setBtnLoad(id,on,label) {
      const b=document.getElementById(id); if(!b) return;
      b.disabled=on; b.textContent=label;
    }
  </script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f5f6f8;--white:#fff;--border:#e5e7eb;--border2:#d1d5db;--text:#111827;--sec:#6b7280;--muted:#9ca3af;--accent:#2563eb;--rad:10px;--shadow:0 1px 3px rgba(0,0,0,.08)}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

    .topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;box-shadow:var(--shadow)}
    .t-logo{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0}
    .t-title{font-size:15px;font-weight:600}
    .t-sub{font-size:12px;color:var(--muted);margin-top:1px}
    .btn-new{margin-left:auto;padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .12s}
    .btn-new:hover{opacity:.88}

    .content{max-width:820px;margin:0 auto;padding:24px 20px 60px}
    .section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}

    .proj-list{display:flex;flex-direction:column;gap:8px}
    .proj-row{background:var(--white);border:1px solid var(--border);border-radius:var(--rad);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .12s;box-shadow:var(--shadow)}
    .proj-row:hover{border-color:var(--border2)}
    .proj-av{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff;flex-shrink:0}
    .proj-info{flex:1;min-width:0}
    .proj-name{font-size:14px;font-weight:600;color:var(--text)}
    .proj-meta{font-size:12px;color:var(--muted);margin-top:1px}
    .proj-btns{display:flex;gap:6px;flex-wrap:wrap}
    .pb{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--white);color:var(--sec);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .12s}
    .pb:hover{border-color:#9ca3af;color:var(--text)}
    .pb-mgr:hover{border-color:#16a34a;color:#16a34a}
    .pb-rep:hover{border-color:var(--accent);color:var(--accent)}
    .pb-sh:hover{border-color:#ca8a04;color:#ca8a04}

    .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
    .b-green{background:#dcfce7;color:#16a34a}
    .b-yellow{background:#fef9c3;color:#ca8a04}

    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:10px;background:var(--white);border:1px solid var(--border);border-radius:var(--rad)}
    .empty-icon{font-size:44px}
    .empty-title{font-size:18px;font-weight:600}
    .empty-sub{font-size:14px;color:var(--muted)}

    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;padding:20px}
    .modal-bg.open{display:flex}
    .modal{background:var(--white);border-radius:12px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.15)}
    .modal-title{font-size:17px;font-weight:600;margin-bottom:4px}
    .modal-sub{font-size:13px;color:var(--sec);margin-bottom:20px}
    .modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;margin-top:-4px}

    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
    .field label{font-size:12px;font-weight:500;color:var(--sec)}
    .field input{background:var(--white);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:14px;padding:9px 12px;outline:none;font-family:inherit;transition:border-color .12s,box-shadow .12s}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .field-hint{font-size:11px;color:var(--muted);margin-top:-9px}
    #form-err{display:none;background:#fee2e2;color:#dc2626;border-radius:7px;padding:8px 12px;font-size:13px;margin-bottom:12px}

    .modal-actions{display:flex;gap:8px;margin-top:20px}
    .btn-primary{flex:1;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .12s}
    .btn-primary:hover{opacity:.88}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .btn-ghost{padding:10px 16px;background:var(--white);border:1px solid var(--border2);color:var(--sec);border-radius:7px;font-size:14px;cursor:pointer;font-family:inherit}
    .btn-ghost:hover{border-color:#9ca3af;color:var(--text)}

    .detail-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
    .detail-section{margin-bottom:20px}
    .link-row{display:flex;align-items:center;gap:8px;background:#f9fafb;border:1px solid var(--border);border-radius:7px;padding:8px 12px;margin-bottom:8px}
    .link-icon{font-size:14px;flex-shrink:0}
    .link-text{flex:1;font-size:12px;color:var(--sec);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
    .copy-btn{padding:4px 10px;background:var(--white);border:1px solid var(--border2);color:var(--sec);border-radius:6px;font-size:11px;cursor:pointer;flex-shrink:0;transition:all .12s}
    .copy-btn:hover{border-color:var(--accent);color:var(--accent)}

    .mgr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
    .mgr-row:last-child{border-bottom:none}
    .mgr-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
    .mgr-name{flex:1;font-size:13px;font-weight:500}
    .mgr-link{padding:3px 9px;background:var(--white);border:1px solid var(--border2);color:var(--sec);border-radius:6px;font-size:11px;cursor:pointer;transition:all .12s}
    .mgr-link:hover{border-color:var(--accent);color:var(--accent)}
    .mgr-del{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:0 4px;transition:color .12s}
    .mgr-del:hover{color:#dc2626}
    .no-mgr{font-size:13px;color:var(--muted);padding:10px 0}
    .add-row{display:flex;gap:8px;margin-top:8px}
    .add-row input{flex:1;background:var(--white);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;font-family:inherit}
    .add-row input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .btn-add{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;border-radius:7px;padding:10px 20px;font-size:13px;font-weight:500;opacity:0;transition:all .2s;z-index:200;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div class="topbar">
  <div class="t-logo">&#9881;</div>
  <div><div class="t-title">Кабинет администратора</div><div class="t-sub">CallCRM</div></div>
  <button class="btn-new" onclick="openModal('m-create')">+ Создать проект</button>
</div>

<div class="content">
  <div class="section-label">Ваши проекты</div>
  <div class="proj-list" id="proj-list">
    <div class="empty"><div class="empty-icon">&#8987;</div><div class="empty-title">Загрузка...</div></div>
  </div>
</div>

<div class="modal-bg" id="m-create">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('m-create')">&#10005;</button>
    <div class="modal-title">Создать проект</div>
    <div class="modal-sub">Система сгенерирует ссылки для менеджера и заказчика автоматически</div>
    <div id="form-err"></div>
    <div class="field"><label>Название проекта *</label><input type="text" id="np-name" placeholder="Экспoдиал Лешоу 2025"></div>
    <div class="field"><label>Ссылка на Google Таблицу</label><input type="text" id="np-sheets" placeholder="https://docs.google.com/spreadsheets/d/..."><div class="field-hint">Необязательно — можно добавить позже</div></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('m-create')">Отмена</button>
      <button class="btn-primary" id="btn-create" onclick="createProject()">Создать проект</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="m-detail">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('m-detail')">&#10005;</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <div>
        <div class="modal-title" id="dp-name"></div>
        <div style="margin-top:5px;display:flex;align-items:center;gap:8px">
          <span id="dp-status" class="badge b-green"></span>
          <span style="font-size:11px;color:var(--muted)">ID: <span id="dp-id" style="font-family:monospace"></span></span>
        </div>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-label">Ссылки проекта</div>
      <div class="link-row"><span class="link-icon">&#128100;</span><span class="link-text" id="dp-lm"></span><button class="copy-btn" onclick="copyText(document.getElementById('dp-lm').textContent)">Копировать</button></div>
      <div class="link-row"><span class="link-icon">&#128065;</span><span class="link-text" id="dp-lr"></span><button class="copy-btn" onclick="copyText(document.getElementById('dp-lr').textContent)">Копировать</button></div>
      <div class="link-row"><span class="link-icon">&#128202;</span><span class="link-text" id="dp-ls"></span><button class="copy-btn" onclick="openLink(document.getElementById('dp-ls').textContent)">Открыть</button></div>
    </div>

    <div class="detail-section">
      <div class="detail-label">Менеджеры проекта</div>
      <div id="dp-mgrs"></div>
      <div class="add-row">
        <input type="text" id="new-mgr" placeholder="Имя менеджера" onkeydown="if(event.key==='Enter')addManager()">
        <button class="btn-add" onclick="addManager()">+ Добавить</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(bg => bg.addEventListener('click', e => { if(e.target===bg) bg.classList.remove('open'); }));
function strColor(s) {
  const p=['#2563eb','#16a34a','#ca8a04','#dc2626','#7c3aed','#0891b2'];
  let h=0; for(let i=0;i<(s||'').length;i++) h=s.charCodeAt(i)+((h<<5)-h);
  return p[Math.abs(h)%p.length];
}
</script>
</body>
</html>
