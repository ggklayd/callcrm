<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кабинет менеджера — CallCRM</title>

  <!-- Firebase SDK v10 (модульный через CDN) -->
  <script type="module">
    import { initializeApp }          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp, query, where, getDocs, orderBy, limit }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // ── Конфиг Firebase (проект DS group) ──────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyD2ssxYMzVt2IUQ2ujRg_7hu2EO3XwtwNg",
      authDomain:        "ds-group-c8bb2.firebaseapp.com",
      projectId:         "ds-group-c8bb2",
      storageBucket:     "ds-group-c8bb2.firebasestorage.app",
      messagingSenderId: "238132930383",
      appId:             "1:238132930383:web:ba08ba7e5f3b38a98c073a",
      measurementId:     "G-J98Y7SVVKL"
    };

    // ── Инициализация ───────────────────────────────────────
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // ── Получаем project_id из URL ──────────────────────────
    // Ссылка менеджера выглядит так:
    //   manager.html?project=expodia-2025&manager=melnikova
    const params     = new URLSearchParams(location.search);
    const PROJECT_ID = params.get('project')  || 'demo-project';
    const MANAGER    = params.get('manager')  || 'Менеджер';

    // ── Ставим имя менеджера в шапку ────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('m-name').textContent = MANAGER;
      document.getElementById('m-proj').textContent = PROJECT_ID;
      loadTodayCount();
    });

    // ── Счётчик: сколько карточек сегодня ───────────────────
    async function loadTodayCount() {
      try {
        const startOfDay = new Date();
        startOfDay.setHours(0, 0, 0, 0);

        const q = query(
          collection(db, 'projects', PROJECT_ID, 'clients'),
          where('manager', '==', MANAGER),
          where('createdAt', '>=', startOfDay)
        );
        const snap = await getDocs(q);
        window._todayCount = snap.size;
        updateCounter();
      } catch (e) {
        console.warn('Счётчик недоступен:', e.message);
        window._todayCount = 0;
      }
    }

    function updateCounter() {
      document.getElementById('sess-count').textContent =
        (window._todayCount || 0) + ' сегодня';
    }

    // ── Сохранение карточки ─────────────────────────────────
    window.saveClient = async function() {
      const org    = v('f-org').trim();
      const phone  = v('f-phone').trim();
      const result = window._selectedResult || '';

      if (!org)    { showStatus('err', 'ti-alert-circle', 'Укажите организацию'); return; }
      if (!phone)  { showStatus('err', 'ti-alert-circle', 'Укажите телефон'); return; }
      if (!result) { showStatus('err', 'ti-alert-circle', 'Выберите результат звонка'); return; }

      setBtnLoading(true);

      const clientData = {
        org_name:  org,
        phone1:    phone,
        mobile:    v('f-mobile').trim(),
        email:     v('f-email').trim(),
        rubric:    v('f-rubric'),
        type_add:  v('f-type'),
        region:    v('f-region').trim(),
        lpr_name:  v('f-lpr-name').trim(),
        lpr_phone: v('f-lpr-phone').trim(),
        lpr_email: v('f-lpr-email').trim(),
        result,
        note:      v('f-note').trim(),
        manager:   MANAGER,
        project:   PROJECT_ID,
        createdAt: serverTimestamp(),
        // Дата читаемым форматом для Google Sheets
        dateStr:   new Date().toLocaleString('ru-RU', {
          day:'2-digit', month:'2-digit', year:'numeric',
          hour:'2-digit', minute:'2-digit'
        }),
      };

      try {
        // Пишем в Firestore: projects/{project_id}/clients/{auto_id}
        await addDoc(
          collection(db, 'projects', PROJECT_ID, 'clients'),
          clientData
        );

        window._todayCount = (window._todayCount || 0) + 1;
        updateCounter();
        addToLog(clientData);
        showStatus('ok', 'ti-check', `"${org}" сохранён`);
        clearForm();

        // ── Авто-экспорт в Google Sheets через Apps Script ──
        // После деплоя sheets-webhook.gs вставьте ваш URL:
        const SHEETS_WEBHOOK = 'https://script.google.com/macros/s/AKfycbxsCQVfeAFrbipFVIlm3rx2f2z0UP8nuJ6z2DuKrUHdcoHsxZimiJP3pr34SJS7SKpb/exec';
        if (!SHEETS_WEBHOOK.startsWith('ВСТАВЬТЕ')) {
          fetch(SHEETS_WEBHOOK, {
            method: 'POST',
            mode:   'no-cors',
            body:   JSON.stringify({ data: clientData }),
          }).catch(() => {});
        }

      } catch (err) {
        console.error(err);
        showStatus('err', 'ti-alert-circle',
          err.code === 'permission-denied'
            ? 'Нет прав записи. Проверьте Security Rules.'
            : 'Ошибка: ' + err.message
        );
      } finally {
        setBtnLoading(false);
      }
    };

    // ── Вспомогательные ────────────────────────────────────
    function v(id) {
      const el = document.getElementById(id);
      return el ? el.value : '';
    }
  </script>

  <style>
    /* ── Сброс и основа ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surf:      #1a1d27;
      --surf2:     #222538;
      --brd:       rgba(255,255,255,.1);
      --brd-s:     rgba(255,255,255,.18);
      --accent:    #4f6fff;
      --acc-glow:  rgba(79,111,255,.18);
      --text:      #e8eaf6;
      --muted:     #7b82a8;
      --success:   #22c55e;
      --suc-bg:    rgba(34,197,94,.12);
      --err:       #f87171;
      --err-bg:    rgba(248,113,113,.12);
      --warn:      #fbbf24;
      --warn-bg:   rgba(251,191,36,.12);
      --blue-bg:   rgba(79,111,255,.12);
      --rad:       8px;
      --rad-sm:    5px;
    }

    html, body {
      height: 100%;
      overflow: hidden; /* весь UI в 1 экран */
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Топбар ─────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      background: var(--surf);
      border-bottom: 1px solid var(--brd);
      flex-shrink: 0;
    }
    .t-logo {
      width: 26px; height: 26px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }
    .t-proj  { font-size: 13px; font-weight: 600; }
    .t-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .t-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .t-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(34,197,94,.2); color: var(--success);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .t-name  { font-size: 12px; color: var(--muted); }
    .t-count {
      font-size: 11px;
      background: var(--blue-bg);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── Тело ───────────────────────────────────────── */
    .body {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Форма ──────────────────────────────────────── */
    .form-area {
      flex: 1;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      overflow: hidden;
    }

    .sect {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 4px;
      border-bottom: 1px solid var(--brd);
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr;         gap: 7px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr;     gap: 7px; }
    .row-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 7px; }
    .col-full { grid-column: 1 / -1; }
    .col-2    { grid-column: span 2; }

    .field { display: flex; flex-direction: column; gap: 3px; }

    label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
    }
    label .req { color: var(--accent); }

    input, select, textarea {
      width: 100%;
      background: var(--surf2);
      border: 1px solid var(--brd);
      border-radius: var(--rad-sm);
      color: var(--text);
      font-size: 13px;
      padding: 6px 9px;
      outline: none;
      font-family: inherit;
      transition: border-color .12s, box-shadow .12s;
      -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--acc-glow);
    }
    select { cursor: pointer; }
    select option { background: #1a1d27; }
    ::placeholder { color: var(--muted); opacity: .5; font-size: 12px; }
    textarea { resize: none; height: 52px; line-height: 1.4; }

    /* ── Кнопки результата ──────────────────────────── */
    .result-row { display: flex; gap: 6px; flex-wrap: wrap; }

    .rb {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--brd-s);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all .12s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .rb:hover { border-color: var(--text); color: var(--text); }

    .rb.on-lid   { background: rgba(34,197,94,.15);  border-color: #22c55e; color: #22c55e; }
    .rb.on-perz  { background: rgba(251,191,36,.15); border-color: #fbbf24; color: #fbbf24; }
    .rb.on-work  { background: var(--blue-bg);       border-color: var(--accent); color: var(--accent); }
    .rb.on-nedoz { background: rgba(251,146,60,.15); border-color: #fb923c; color: #fb923c; }
    .rb.on-otkaz { background: rgba(248,113,113,.15);border-color: #f87171; color: #f87171; }

    /* ── Сайдбар с логом ────────────────────────────── */
    .sidebar {
      width: 176px;
      border-left: 1px solid var(--brd);
      background: var(--surf);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sb-head {
      padding: 9px 12px 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--brd);
      flex-shrink: 0;
    }
    .sb-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .sb-list::-webkit-scrollbar { width: 3px; }
    .sb-list::-webkit-scrollbar-thumb { background: var(--brd-s); border-radius: 3px; }
    .log-item {
      padding: 7px 11px;
      border-bottom: 1px solid var(--brd);
      cursor: default;
    }
    .log-item:last-child { border-bottom: none; }
    .log-org {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .log-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }
    .log-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 20px;
      font-weight: 500;
    }
    .log-time { font-size: 10px; color: var(--muted); margin-left: auto; }
    .sb-empty {
      padding: 20px 12px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    /* ── Боттомбар ──────────────────────────────────── */
    .bottom {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surf);
      border-top: 1px solid var(--brd);
      flex-shrink: 0;
    }
    .btn-save {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--rad);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .12s, transform .08s;
    }
    .btn-save:hover   { opacity: .88; }
    .btn-save:active  { transform: scale(.97); }
    .btn-save:disabled{ opacity: .45; cursor: not-allowed; }

    .btn-clear {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--brd-s);
      color: var(--muted);
      border-radius: var(--rad);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all .12s;
    }
    .btn-clear:hover { border-color: var(--text); color: var(--text); }

    /* ── Спиннер ────────────────────────────────────── */
    .spin {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: sp .5s linear infinite;
      display: none;
    }
    .btn-save.loading .spin       { display: block; }
    .btn-save.loading .save-label { display: none; }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* ── Статус ─────────────────────────────────────── */
    .status {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: var(--rad);
    }
    .status.ok  { display: flex; background: var(--suc-bg); color: var(--success); }
    .status.err { display: flex; background: var(--err-bg); color: var(--err); }

    /* ── Иконки (Unicode fallback если нет font) ────── */
    .ico::before { font-family: 'Material Icons', sans-serif; font-size: 13px; }
  </style>
</head>
<body>

<!-- ТОПБАР -->
<div class="topbar">
  <div class="t-logo">📋</div>
  <div>
    <div class="t-proj" id="m-proj">Загрузка...</div>
    <div class="t-sub">Карточка клиента</div>
  </div>
  <div class="t-right">
    <div class="t-avatar" id="m-initials">МН</div>
    <span class="t-name" id="m-name">Менеджер</span>
    <span class="t-count" id="sess-count">0 сегодня</span>
  </div>
</div>

<!-- ТЕЛО -->
<div class="body">

  <!-- ФОРМА -->
  <div class="form-area">

    <div class="sect">Организация</div>
    <div class="row-3">
      <div class="field col-full" style="grid-column:1/-1">
        <label>Наименование <span class="req">*</span></label>
        <input type="text" id="f-org" placeholder="ООО Красотулька" autocomplete="off">
      </div>
    </div>
    <div class="row-3">
      <div class="field">
        <label>Рубрика</label>
        <select id="f-rubric">
          <option value="">—</option>
          <option>Верхняя одежда</option>
          <option>Нижнее бельё</option>
          <option>Спортивная одежда</option>
          <option>Детская одежда</option>
          <option>Обувь</option>
          <option>Аксессуары</option>
          <option>Другое</option>
        </select>
      </div>
      <div class="field">
        <label>Тип магазина</label>
        <select id="f-type">
          <option value="">—</option>
          <option>магазин женской одежды</option>
          <option>магазин мужской одежды</option>
          <option>магазин детской одежды</option>
          <option>мультибрендовый магазин</option>
          <option>интернет-магазин</option>
          <option>оптовый поставщик</option>
        </select>
      </div>
      <div class="field">
        <label>Регион</label>
        <input type="text" id="f-region" placeholder="Московская обл.">
      </div>
    </div>

    <div class="sect">Контакты</div>
    <div class="row-4">
      <div class="field">
        <label>Телефон <span class="req">*</span></label>
        <input type="tel" id="f-phone" placeholder="79001234567">
      </div>
      <div class="field">
        <label>Сотовый</label>
        <input type="tel" id="f-mobile" placeholder="79001234567">
      </div>
      <div class="field col-2">
        <label>E-mail</label>
        <input type="email" id="f-email" placeholder="info@company.ru">
      </div>
    </div>

    <div class="sect">ЛПР</div>
    <div class="row-3">
      <div class="field">
        <label>Имя</label>
        <input type="text" id="f-lpr-name" placeholder="Татьяна">
      </div>
      <div class="field">
        <label>Телефон ЛПР</label>
        <input type="tel" id="f-lpr-phone" placeholder="79001234567">
      </div>
      <div class="field">
        <label>Почта ЛПР</label>
        <input type="email" id="f-lpr-email" placeholder="boss@company.ru">
      </div>
    </div>

    <div class="sect">Результат звонка <span class="req" style="text-transform:none;font-size:11px">*</span></div>
    <div class="result-row">
      <button class="rb" data-val="Лид"           data-cls="on-lid"   onclick="pickResult(this)">✅ Лид</button>
      <button class="rb" data-val="Перезвонить"   data-cls="on-perz"  onclick="pickResult(this)">🔄 Перезвонить</button>
      <button class="rb" data-val="В работе"      data-cls="on-work"  onclick="pickResult(this)">🔵 В работе</button>
      <button class="rb" data-val="Не дозвонился" data-cls="on-nedoz" onclick="pickResult(this)">🟠 Не дозвонился</button>
      <button class="rb" data-val="Отказ"         data-cls="on-otkaz" onclick="pickResult(this)">❌ Отказ</button>
    </div>

    <div class="sect">Примечание</div>
    <textarea id="f-note" placeholder="Хочет участвовать, просит прислать ссылку на регистрацию..."></textarea>

  </div>

  <!-- САЙДБАР -->
  <div class="sidebar">
    <div class="sb-head">Сохранено сегодня</div>
    <div class="sb-list" id="log-list">
      <div class="sb-empty">Записей пока нет.<br>Заполните карточку и нажмите «Сохранить».</div>
    </div>
  </div>

</div>

<!-- БОТТОМБАР -->
<div class="bottom">
  <button class="btn-save" id="btn-save" onclick="saveClient()">
    <div class="spin"></div>
    <span class="save-label">💾 Сохранить</span>
  </button>
  <button class="btn-clear" onclick="clearForm()">Очистить</button>
  <div class="status" id="status">
    <span id="s-icon"></span>
    <span id="s-text"></span>
  </div>
</div>

<script>
// ── Выбор результата ──────────────────────────────────
window._selectedResult = '';

function pickResult(btn) {
  document.querySelectorAll('.rb').forEach(b =>
    b.classList.remove('on-lid','on-perz','on-work','on-nedoz','on-otkaz')
  );
  btn.classList.add(btn.dataset.cls);
  window._selectedResult = btn.dataset.val;
}

// ── Лог сессии ────────────────────────────────────────
const BADGE_STYLES = {
  'Лид':            'background:rgba(34,197,94,.2);color:#22c55e',
  'Перезвонить':    'background:rgba(251,191,36,.2);color:#fbbf24',
  'В работе':       'background:rgba(79,111,255,.2);color:#4f6fff',
  'Не дозвонился':  'background:rgba(251,146,60,.2);color:#fb923c',
  'Отказ':          'background:rgba(248,113,113,.2);color:#f87171',
};

function addToLog(d) {
  const list = document.getElementById('log-list');
  list.querySelectorAll('.sb-empty').forEach(e => e.remove());

  const style = BADGE_STYLES[d.result] || 'background:rgba(255,255,255,.1);color:#7b82a8';
  const time  = new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });

  const item  = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML =
    '<div class="log-org">' + esc(d.org_name) + '</div>' +
    '<div class="log-meta">' +
      '<span class="log-badge" style="' + style + '">' + esc(d.result) + '</span>' +
      '<span class="log-time">' + time + '</span>' +
    '</div>';
  list.prepend(item);
}

// ── Очистка формы ─────────────────────────────────────
function clearForm() {
  ['f-org','f-phone','f-mobile','f-email','f-region',
   'f-lpr-name','f-lpr-phone','f-lpr-email','f-note'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-rubric').value = '';
  document.getElementById('f-type').value   = '';
  document.querySelectorAll('.rb').forEach(b =>
    b.classList.remove('on-lid','on-perz','on-work','on-nedoz','on-otkaz')
  );
  window._selectedResult = '';
  hideStatus();
}

// ── UI-утилиты ────────────────────────────────────────
function setBtnLoading(on) {
  const btn = document.getElementById('btn-save');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
}

function showStatus(type, icon, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  document.getElementById('s-icon').textContent = type === 'ok' ? '✓' : '✗';
  document.getElementById('s-text').textContent = msg;
  if (type === 'ok') setTimeout(hideStatus, 5000);
}

function hideStatus() {
  document.getElementById('status').className = 'status';
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Инициалы менеджера в аватар ───────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  const name   = params.get('manager') || '';
  const parts  = name.split(/[\s_-]/);
  const initials = parts.length >= 2
    ? parts[0][0].toUpperCase() + parts[1][0].toUpperCase()
    : name.slice(0,2).toUpperCase();
  const av = document.getElementById('m-initials');
  if (av && initials) av.textContent = initials;
});
</script>
</body>
